[pytest]
asyncio_mode = auto
addopts = -v --html=report.html --self-contained-html --cov-report=html:htmlcov
testpaths = tests
python_files = test_*.py *_test.py
# env_files is intentionally empty.
# Pass --envfile=.env.dev / .env.staging / .env.prod explicitly when
# running postman tests against a live server.
markers =
    ui: UI end-to-end tests (Playwright, require network access to BASE_URL_UI)
