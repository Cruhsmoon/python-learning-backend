[pytest]
asyncio_mode = auto
addopts = -v
testpaths = tests
python_files = test_*.py *_test.py
markers =
    ui: UI end-to-end tests (Playwright, require network access to BASE_URL_UI)
    performance: Response time SLA assertions
    benchmark: Microbenchmarks via pytest-benchmark
    negative: Negative / error-path API tests
    security: Security and injection tests (subset of negative)
    contract: JSON Schema contract validation
