name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Unit / API / DB / Celery tests ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ALLURE_RESULTS_DIR: allure-results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage and Allure
        run: |
          pytest \
            --ignore=tests/postman \
            --ignore=tests/ui \
            --ignore=tests/api/test_openapi.py \
            --cov=src \
            --cov-config=.coveragerc \
            --cov-branch \
            --cov-fail-under=80 \
            --alluredir=allure-results \
            -q

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sLo allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          echo "$(pwd)/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate allure-results \
            --clean \
            -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload raw Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 7

  # ── UI / Playwright end-to-end tests ────────────────────────────────────────
  ui-test:
    runs-on: ubuntu-latest

    env:
      ALLURE_RESULTS_DIR: allure-results-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run UI tests (headless Chromium)
        env:
          BASE_URL_UI: https://www.greenbook.org
        run: |
          pytest tests/ui \
            -v \
            --tb=short \
            -m ui \
            --alluredir=allure-results-ui
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sLo allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz
          echo "$(pwd)/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: |
          allure generate allure-results-ui \
            --clean \
            -o allure-report-ui

      - name: Upload UI Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-ui-${{ github.run_number }}
          path: allure-report-ui/
          retention-days: 30
